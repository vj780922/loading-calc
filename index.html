<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面密度計算機 - SJ</title>
    <style>
        body {
            font-family: "Calibri", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f9;
            color: #2d3748;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { width: 100%; max-width: 550px; }
        .card { background: #ffffff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); padding: 35px; margin-bottom: 25px; }
        h2 { text-align: center; margin-top: 0; color: #1a365d; font-size: 24px; margin-bottom: 30px; }
        .section-label { font-weight: bold; margin-bottom: 12px; display: block; color: #3182ce; border-left: 4px solid #3182ce; padding-left: 10px; }
        .input-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .input-group label { font-size: 12px; color: #718096; margin-bottom: 5px; display: block; }
        input[type="number"] { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; }
        input[type="number"]:focus { border-color: #3182ce; }
        button { width: 100%; padding: 15px; background-color: #3182ce; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2c5282; }
        .result-area { margin-top: 30px; padding: 20px; background-color: #ebf8ff; border-radius: 12px; border: 1px solid #bee3f8; display: none; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .final-val { font-size: 20px; font-weight: bold; color: #2b6cb0; border-top: 2px dashed #90cdf4; padding-top: 15px; margin-top: 15px; }
        .footer-info { text-align: center; font-size: 13px; color: #718096; line-height: 2; }
        .visit-badge { background: #e2e8f0; padding: 2px 10px; border-radius: 12px; font-weight: bold; color: #4a5568; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>面密度計算機</h2>
        <span class="section-label">空箔重 (g)</span>
        <div class="input-row">
            <div class="input-group"><label>第 1 筆</label><input type="number" id="f1" step="0.001" placeholder="0.000"></div>
            <div class="input-group"><label>第 2 筆</label><input type="number" id="f2" step="0.001" placeholder="0.000"></div>
            <div class="input-group"><label>第 3 筆</label><input type="number" id="f3" step="0.001" placeholder="0.000"></div>
        </div>
        <span class="section-label">塗膜重 (g)</span>
        <div class="input-row">
            <div class="input-group"><label>第 1 筆</label><input type="number" id="c1" step="0.001" placeholder="0.000"></div>
            <div class="input-group"><label>第 2 筆</label><input type="number" id="c2" step="0.001" placeholder="0.000"></div>
            <div class="input-group"><label>第 3 筆</label><input type="number" id="c3" step="0.001" placeholder="0.000"></div>
        </div>
        <button onclick="calculate()">執行計算</button>
        <div id="resultBox" class="result-area">
            <div class="result-line"><span>平均空箔重：</span><span id="avgFoil">-</span></div>
            <div class="result-line"><span>平均塗膜重：</span><span id="avgCoat">-</span></div>
            <div class="result-line final-val"><span>平均面密度：</span><span id="finalRes">-</span></div>
        </div>
    </div>
    <div class="footer-info">
        <div>作者：SJ | 版本：v1.5 | 最後更新日期：2024/05/20</div>
        <div>拜訪次數：<span class="visit-badge" id="visitCount">0</span></div>
    </div>
</div>

<script>
    window.onload = function() {
        let count = localStorage.getItem('sj_calc_visits') || 0;
        count = parseInt(count) + 1;
        localStorage.setItem('sj_calc_visits', count);
        document.getElementById('visitCount').innerText = count;
    };

    function roundTo(num, decimals) {
        return Math.round((num + Number.EPSILON) * Math.pow(10, decimals)) / Math.pow(10, decimals);
    }

    function calculate() {
        const f1 = parseFloat(document.getElementById('f1').value) || 0;
        const f2 = parseFloat(document.getElementById('f2').value) || 0;
        const f3 = parseFloat(document.getElementById('f3').value) || 0;
        const c1 = parseFloat(document.getElementById('c1').value) || 0;
        const c2 = parseFloat(document.getElementById('c2').value) || 0;
        const c3 = parseFloat(document.getElementById('c3').value) || 0;

        const avgFoil = roundTo((f1 + f2 + f3) / 3, 4);
        const avgCoat = roundTo((c1 + c2 + c3) / 3, 4);

        // 修正公式順序：(總重 - 箔重)
        const resultRaw = ((avgCoat - avgFoil) / 15.52) * 1000;
        const finalValue = roundTo(resultRaw, 3);

        document.getElementById('avgFoil').innerText = avgFoil.toFixed(4) + " g";
        document.getElementById('avgCoat').innerText = avgCoat.toFixed(4) + " g";
        document.getElementById('finalRes').innerText = finalValue.toFixed(3) + " mg/cm²";
        document.getElementById('resultBox').style.display = 'block';
    }
</script>
</body>
</html>
