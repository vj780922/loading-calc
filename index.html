<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面密度計算機</title>
    <style>
        body {
            font-family: "Calibri", "Microsoft JhengHei", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .calculator-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 100%;
            max-width: 480px;
        }
        h2 {
            text-align: center;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 10px;
            border-left: 4px solid #2b6cb0;
            padding-left: 8px;
        }
        .input-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
        }
        .input-field label {
            font-size: 13px;
            color: #718096;
            margin-bottom: 4px;
        }
        input[type="number"] {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-container {
            margin-top: 25px;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 15px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px dashed #90cdf4;
        }
        .final-result {
            font-size: 18px;
            font-weight: bold;
            color: #2b6cb0;
        }
        .error-msg {
            color: #e53e3e;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>面密度計算機</h2>
    
    <!-- 空箔重輸入區 -->
    <div class="section-title">空箔重 (g)</div>
    <div class="input-group">
        <div class="input-field">
            <label for="foil1">第 1 筆</label>
            <input type="number" id="foil1" step="0.001" placeholder="0.000" min="0">
        </div>
        <div class="input-field">
            <label for="foil2">第 2 筆</label>
            <input type="number" id="foil2" step="0.001" placeholder="0.000" min="0">
        </div>
        <div class="input-field">
            <label for="foil3">第 3 筆</label>
            <input type="number" id="foil3" step="0.001" placeholder="0.000" min="0">
        </div>
    </div>

    <!-- 塗膜重輸入區 -->
    <div class="section-title">塗膜重 (g)</div>
    <div class="input-group">
        <div class="input-field">
            <label for="coat1">第 1 筆</label>
            <input type="number" id="coat1" step="0.001" placeholder="0.000" min="0">
        </div>
        <div class="input-field">
            <label for="coat2">第 2 筆</label>
            <input type="number" id="coat2" step="0.001" placeholder="0.000" min="0">
        </div>
        <div class="input-field">
            <label for="coat3">第 3 筆</label>
            <input type="number" id="coat3" step="0.001" placeholder="0.000" min="0">
        </div>
    </div>

    <button onclick="calculateDensity()">開始計算</button>
    <div id="error" class="error-msg">請填寫所有欄位，且數值需大於 0</div>

    <!-- 計算結果顯示區 -->
    <div class="result-container" id="results" style="display: none;">
        <div class="result-item">
            <span>平均空箔重：</span>
            <span id="avgFoil">-</span>
        </div>
        <div class="result-item">
            <span>平均塗膜重：</span>
            <span id="avgCoat">-</span>
        </div>
        <div class="result-item final-result">
            <span>計算面密度：</span>
            <span id="finalDensity">-</span>
        </div>
    </div>
</div>

<script>
    // 精確的四捨五入函式，避免 JavaScript 浮點數運算誤差
    function roundTo(num, decimals) {
        return Math.round((num + Number.EPSILON) * Math.pow(10, decimals)) / Math.pow(10, decimals);
    }

    function calculateDensity() {
        const errorDiv = document.getElementById('error');
        const resultsDiv = document.getElementById('results');

        // 取得輸入值
        const foil1 = parseFloat(document.getElementById('foil1').value);
        const foil2 = parseFloat(document.getElementById('foil2').value);
        const foil3 = parseFloat(document.getElementById('foil3').value);
        
        const coat1 = parseFloat(document.getElementById('coat1').value);
        const coat2 = parseFloat(document.getElementById('coat2').value);
        const coat3 = parseFloat(document.getElementById('coat3').value);

        // 檢查欄位是否齊全
        if (isNaN(foil1) || isNaN(foil2) || isNaN(foil3) || isNaN(coat1) || isNaN(coat2) || isNaN(coat3)) {
            errorDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            return;
        }

        // 檢查分母（平均塗膜重）不可為 0
        if (coat1 + coat2 + coat3 === 0) {
            errorDiv.innerText = "塗膜重平均不可為 0";
            errorDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            return;
        }

        errorDiv.style.display = 'none';

        // 1. 計算平均值並取到小數下四位（四捨五入）
        const avgFoilRaw = (foil1 + foil2 + foil3) / 3;
        const avgCoatRaw = (coat1 + coat2 + coat3) / 3;
        
        const avgFoil = roundTo(avgFoilRaw, 4);
        const avgCoat = roundTo(avgCoatRaw, 4);

        // 2. 依公式計算面密度：(平均空箔重 / 平均塗膜重) * 15.52 * 1000
        // 取到小數下三位（四捨五入）
        const densityRaw = (avgFoil / avgCoat) * 15.52 * 1000;
        const finalDensity = roundTo(densityRaw, 3);

        // 3. 渲染到畫面上（強制補足小數位數）
        document.getElementById('avgFoil').innerText = avgFoil.toFixed(4) + " g";
        document.getElementById('avgCoat').innerText = avgCoat.toFixed(4) + " g";
        document.getElementById('finalDensity').innerText = finalDensity.toFixed(3);
        
        resultsDiv.style.display = 'block';
    }
</script>

</body>
</html>
