<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面密度計算機 - SJ</title>
    <style>
        /* 字型設定：英文 Calibri, 中文 微軟正黑體 */
        body {
            font-family: "Calibri", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            color: #1a202c;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* 頂部資訊置中排版 */
        .info-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #4a5568;
            line-height: 1.6;
        }

        .info-header span {
            margin: 0 10px;
        }

        .visit-box {
            display: inline-block;
            background: #edf2f7;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: #2b6cb0;
        }

        /* 計算機主體卡片 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #2d3748;
            border-bottom: 2px solid #3182ce;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .input-section {
            margin-bottom: 25px;
        }

        .section-label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: #2b6cb0;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 4px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        /* 結果顯示 */
        .result-area {
            margin-top: 25px;
            padding: 20px;
            background-color: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: none;
        }

        .result-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .final-val {
            font-size: 18px;
            font-weight: bold;
            color: #e53e3e;
            border-top: 1px dashed #cbd5e0;
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="info-header">
        <div>
            <span>作者：SJ</span> | 
            <span>版本：v1.0</span> | 
            <span>最後更新日期：2024/05/20</span>
        </div>
        <div style="margin-top: 8px;">
            拜訪次數：<span class="visit-box" id="visitCount">0</span>
        </div>
    </div>

    <div class="card">
        <h2>面密度計算機</h2>

        <div class="input-section">
            <span class="section-label">空箔重 (g)</span>
            <div class="input-row">
                <div class="input-group">
                    <label>筆 1</label>
                    <input type="number" id="f1" step="0.001" placeholder="0.000">
                </div>
                <div class="input-group">
                    <label>筆 2</label>
                    <input type="number" id="f2" step="0.001" placeholder="0.000">
                </div>
                <div class="input-group">
                    <label>筆 3</label>
                    <input type="number" id="f3" step="0.001" placeholder="0.000">
                </div>
            </div>
        </div>

        <div class="input-section">
            <span class="section-label">塗膜重 (g)</span>
            <div class="input-row">
                <div class="input-group">
                    <label>筆 1</label>
                    <input type="number" id="c1" step="0.001" placeholder="0.000">
                </div>
                <div class="input-group">
                    <label>筆 2</label>
                    <input type="number" id="c2" step="0.001" placeholder="0.000">
                </div>
                <div class="input-group">
                    <label>筆 3</label>
                    <input type="number" id="c3" step="0.001" placeholder="0.000">
                </div>
            </div>
        </div>

        <button onclick="calculate()">計算面密度</button>

        <div id="resultBox" class="result-area">
            <div class="result-line">
                <span>平均空箔重：</span>
                <span id="avgFoil">0.0000 g</span>
            </div>
            <div class="result-line">
                <span>平均塗膜重：</span>
                <span id="avgCoat">0.0000 g</span>
            </div>
            <div class="result-line final-val">
                <span>計算面密度值：</span>
                <span id="finalRes">0.000</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 拜訪次數模擬 (使用 localStorage)
    window.onload = function() {
        let count = localStorage.getItem('visit_count') || 0;
        count = parseInt(count) + 1;
        localStorage.setItem('visit_count', count);
        document.getElementById('visitCount').innerText = count;
    };

    // 四捨五入函式
    function roundTo(num, decimals) {
        return Math.round((num + Number.EPSILON) * Math.pow(10, decimals)) / Math.pow(10, decimals);
    }

    function calculate() {
        // 讀取數值
        const f = [
            parseFloat(document.getElementById('f1').value) || 0,
            parseFloat(document.getElementById('f2').value) || 0,
            parseFloat(document.getElementById('f3').value) || 0
        ];
        const c = [
            parseFloat(document.getElementById('c1').value) || 0,
            parseFloat(document.getElementById('c2').value) || 0,
            parseFloat(document.getElementById('c3').value) || 0
        ];

        // 1. 計算平均並取小數下四位四捨五入
        const avgF = roundTo((f[0] + f[1] + f[2]) / 3, 4);
        const avgC = roundTo((c[0] + c[1] + c[2]) / 3, 4);

        if (avgC === 0) {
            alert("塗膜重平均不能為 0");
            return;
        }

        // 2. 公式：(平均空箔重 / 平均塗膜重) * 15.52 * 1000
        // 取小數下三位四捨五入
        const loadingLevel = roundTo((avgF / avgC) * 15.52 * 1000, 3);

        // 顯示結果
        document.getElementById('avgFoil').innerText = avgF.toFixed(4) + " g";
        document.getElementById('avgCoat').innerText = avgC.toFixed(4) + " g";
        document.getElementById('finalRes').innerText = loadingLevel.toFixed(3);
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
